<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Explorer | Workspace</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-body: #f9fafb;
            --bg-panel: #ffffff;
            --border: #e5e7eb;
            --text-main: #111827;
            --text-muted: #6b7280;
            --primary: #000000;
            --primary-hover: #374151;
            --accent-post: #0ea5e9;
            --accent-get: #8b5cf6;
            --radius: 12px;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Sidebar */
        .sidebar {
            width: 320px;
            background: var(--bg-panel);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            z-index: 10;
            box-shadow: var(--shadow-sm);
        }

        .sidebar-header {
            padding: 24px;
            border-bottom: 1px solid var(--border);
        }

        .sidebar-header h1 {
            font-size: 18px;
            font-weight: 600;
            letter-spacing: -0.02em;
        }

        .sidebar-header p {
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .route-list {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .route-item {
            padding: 12px 16px;
            border-radius: 8px;
            cursor: pointer;
            border: 1px solid transparent;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .route-item:hover {
            background-color: #f3f4f6;
        }

        .route-item.active {
            background-color: #f3f4f6;
            border-color: var(--border);
            box-shadow: var(--shadow-sm);
        }

        .method-badge {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            font-weight: 700;
            padding: 4px 8px;
            border-radius: 6px;
            text-transform: uppercase;
        }

        .method-badge.POST { background: #e0f2fe; color: #0369a1; }
        .method-badge.GET { background: #ede9fe; color: #5b21b6; }

        .route-path {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-main);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Main Area */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            padding: 40px;
            align-items: center;
        }

        .empty-state {
            margin: auto;
            text-align: center;
            color: var(--text-muted);
        }

        .empty-state svg { width: 48px; height: 48px; margin-bottom: 16px; opacity: 0.5; }

        .panel {
            width: 100%;
            max-width: 800px;
            background: var(--bg-panel);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            box-shadow: var(--shadow-md);
            overflow: hidden;
            display: none; /* Hidden by default */
        }

        .panel-header {
            padding: 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 16px;
            background: #fafafa;
        }

        .panel-header h2 {
            font-family: 'JetBrains Mono', monospace;
            font-size: 20px;
            font-weight: 500;
            letter-spacing: -0.02em;
        }

        .panel-body {
            padding: 32px 24px;
        }

        .section-title {
            font-size: 12px;
            text-transform: uppercase;
            font-weight: 600;
            color: var(--text-muted);
            letter-spacing: 0.05em;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
            font-family: 'JetBrains Mono', monospace;
        }

        .form-group input, .form-group textarea {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            transition: all 0.2s;
            outline: none;
            background: #f9fafb;
        }

        .form-group input:focus, .form-group textarea:focus {
            background: #ffffff;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(0,0,0,0.05);
        }

        .action-bar {
            margin-top: 32px;
            display: flex;
            justify-content: flex-end;
        }

        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        button:hover { background: var(--primary-hover); }
        button:disabled { opacity: 0.7; cursor: not-allowed; }

        .response-area {
            margin-top: 40px;
            display: none;
        }

        .response-box {
            background: #111827;
            color: #e5e7eb;
            padding: 20px;
            border-radius: 8px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            overflow-x: auto;
            line-height: 1.5;
        }

        .loader {
            display: none;
            width: 16px;
            height: 16px;
            border: 2px solid #ffffff;
            border-bottom-color: transparent;
            border-radius: 50%;
            animation: rotation 1s linear infinite;
        }

        @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Scrollbar styling */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #9ca3af; }
    </style>
</head>
<body>

<aside class="sidebar">
    <div class="sidebar-header">
        <h1>API Explorer</h1>
        <p>Dicionário dinâmico do server.js</p>
    </div>
    <div class="route-list" id="routeList">
    </div>
</aside>

<main class="main-content">
    <div class="empty-state" id="emptyState">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
        <h2>Selecione um endpoint</h2>
        <p>Escolha uma rota na barra lateral para inspecionar e testar.</p>
    </div>

    <div class="panel" id="apiPanel">
        <div class="panel-header">
            <span class="method-badge POST" id="headerMethod">POST</span>
            <h2 id="headerEndpoint">/jobs/notify/transferencia</h2>
        </div>

        <div class="panel-body">
            <div id="paramsContainer">
                <div class="section-title">
                    <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h7"></path></svg>
                    Parâmetros da Requisição (Body)
                </div>
                <form id="dynamicForm">
                </form>
            </div>

            <div class="action-bar">
                <button id="btnSend">
                    <span id="btnText">Enviar Requisição</span>
                    <span class="loader" id="btnLoader"></span>
                </button>
            </div>

            <div class="response-area" id="responseArea">
                <div class="section-title">
                    <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 9l3 3-3 3m5 0h3M5 20h14a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                    Resposta do Servidor
                </div>
                <pre class="response-box" id="responseOutput">// A resposta aparecerá aqui...</pre>
            </div>
        </div>
    </div>
</main>

<script>
    let apiRoutes = [];
    let currentRoute = null;

    // Elementos DOM
    const routeList = document.getElementById('routeList');
    const emptyState = document.getElementById('emptyState');
    const apiPanel = document.getElementById('apiPanel');
    const headerMethod = document.getElementById('headerMethod');
    const headerEndpoint = document.getElementById('headerEndpoint');
    const dynamicForm = document.getElementById('dynamicForm');
    const paramsContainer = document.getElementById('paramsContainer');
    const btnSend = document.getElementById('btnSend');
    const btnText = document.getElementById('btnText');
    const btnLoader = document.getElementById('btnLoader');
    const responseArea = document.getElementById('responseArea');
    const responseOutput = document.getElementById('responseOutput');

    // Busca a estrutura do código lendo o backend
    async function fetchRoutes() {
        try {
            // Acessando o endpoint dinâmico criado no server.js
            const res = await fetch('/jobs/api/explorer-data');
            apiRoutes = await res.json();
            renderSidebar();
        } catch (err) {
            console.error("Erro ao ler documentação da API:", err);
            routeList.innerHTML = `<p style="color:red; font-size:12px;">Erro ao conectar com servidor.</p>`;
        }
    }

    function renderSidebar() {
        routeList.innerHTML = '';
        apiRoutes.forEach(route => {
            const div = document.createElement('div');
            div.className = 'route-item';
            div.innerHTML = `
                    <span class="method-badge ${route.method}">${route.method}</span>
                    <span class="route-path">${route.endpoint}</span>
                `;
            div.onclick = () => selectRoute(route, div);
            routeList.appendChild(div);
        });
    }

    function selectRoute(route, element) {
        // Atualiza UI ativa
        document.querySelectorAll('.route-item').forEach(el => el.classList.remove('active'));
        element.classList.add('active');

        currentRoute = route;
        emptyState.style.display = 'none';
        apiPanel.style.display = 'block';
        responseArea.style.display = 'none';

        // Preenche Header
        headerMethod.textContent = route.method;
        headerMethod.className = `method-badge ${route.method}`;
        headerEndpoint.textContent = '/jobs' + route.endpoint;

        // Gera Formulário Dinâmico
        dynamicForm.innerHTML = '';
        if (route.params && route.params.length > 0) {
            paramsContainer.style.display = 'block';
            route.params.forEach(param => {
                const group = document.createElement('div');
                group.className = 'form-group';

                // Tratamento para objetos aninhados se houver, ou texto simples
                let inputHTML = `<input type="text" id="${param}" name="${param}" placeholder="Digite o valor..." autocomplete="off">`;

                group.innerHTML = `
                        <label for="${param}">${param}</label>
                        ${inputHTML}
                    `;
                dynamicForm.appendChild(group);
            });
        } else {
            paramsContainer.style.display = 'none';
        }
    }

    btnSend.onclick = async () => {
        if (!currentRoute) return;

        // Prepara Body
        const bodyData = {};
        if (currentRoute.params) {
            currentRoute.params.forEach(param => {
                const input = document.getElementById(param);
                if (input && input.value) {
                    bodyData[param] = input.value;
                }
            });
        }

        // Estado de Loading
        btnText.textContent = 'Processando...';
        btnLoader.style.display = 'block';
        btnSend.disabled = true;
        responseArea.style.display = 'block';
        responseOutput.textContent = 'Aguardando resposta...';

        try {
            const fullUrl = '/jobs' + currentRoute.endpoint;
            const options = {
                method: currentRoute.method,
                headers: {
                    'Content-Type': 'application/json'
                }
            };

            if (currentRoute.method !== 'GET') {
                options.body = JSON.stringify(bodyData);
            }

            const res = await fetch(fullUrl, options);
            const contentType = res.headers.get("content-type");

            let data;
            if (contentType && contentType.includes("application/json")) {
                data = await res.json();
                responseOutput.textContent = JSON.stringify(data, null, 2);
            } else {
                data = await res.text();
                responseOutput.textContent = data;
            }
        } catch (err) {
            responseOutput.textContent = `Erro de Conexão: ${err.message}`;
        } finally {
            btnText.textContent = 'Enviar Requisição';
            btnLoader.style.display = 'none';
            btnSend.disabled = false;
        }
    };

    // Inicia a aplicação
    fetchRoutes();
</script>
</body>
</html>
